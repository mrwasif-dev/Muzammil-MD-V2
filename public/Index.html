<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muzammil MD - WhatsApp Bot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            max-width: 550px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .bot-icon {
            font-size: 60px;
            display: block;
            margin-bottom: 10px;
        }
        
        .bot-name {
            color: #fff;
            font-size: 28px;
            font-weight: 700;
        }
        
        .bot-name span {
            color: #4fc3f7;
        }
        
        .subtitle {
            color: #aaa;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .status-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            color: #ccc;
            font-size: 14px;
        }
        
        .status-row .label {
            color: #888;
        }
        
        .status-row .value {
            font-weight: 600;
        }
        
        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        .status-dot.online {
            background: #4caf50;
            box-shadow: 0 0 10px #4caf50;
        }
        
        .status-dot.offline {
            background: #f44336;
            box-shadow: 0 0 10px #f44336;
        }
        
        .status-dot.waiting {
            background: #ff9800;
            box-shadow: 0 0 10px #ff9800;
        }
        
        .mode-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .mode-badge.public {
            background: #4caf50;
            color: #fff;
        }
        
        .mode-badge.private {
            background: #f44336;
            color: #fff;
        }
        
        .qr-box {
            background: #fff;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            min-height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 15px 0;
        }
        
        #qrImage {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
        }
        
        .qr-placeholder {
            color: #999;
            font-size: 16px;
        }
        
        .pairing-box {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            padding: 20px;
            margin: 15px 0;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .pairing-box h3 {
            color: #fff;
            font-size: 16px;
            margin-bottom: 15px;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
        }
        
        .input-group input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }
        
        .input-group input:focus {
            border-color: #4fc3f7;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .input-group input::placeholder {
            color: #666;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: #fff;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #4fc3f7, #0288d1);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(79, 195, 247, 0.3);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #66bb6a, #388e3c);
        }
        
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 187, 106, 0.3);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #ef5350, #c62828);
        }
        
        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(239, 83, 80, 0.3);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        
        .btn-group .btn {
            flex: 1;
            min-width: 100px;
            text-align: center;
        }
        
        .mode-control {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        .mode-control .btn {
            flex: 1;
        }
        
        .footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            color: #666;
            font-size: 13px;
        }
        
        .footer a {
            color: #4fc3f7;
            text-decoration: none;
        }
        
        .footer a:hover {
            text-decoration: underline;
        }
        
        .footer .pro {
            color: #ffd54f;
            font-weight: 600;
        }
        
        .pair-code-display {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin-top: 10px;
            text-align: center;
            color: #4fc3f7;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 5px;
            display: none;
        }
        
        .pair-code-display.show {
            display: block;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 14px;
            display: none;
            z-index: 1000;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .toast.show {
            display: block;
            animation: slideUp 0.3s ease;
        }
        
        .toast.success {
            border-color: #4caf50;
        }
        
        .toast.error {
            border-color: #f44336;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }
            .btn-group {
                flex-direction: column;
            }
            .btn-group .btn {
                width: 100%;
            }
            .mode-control {
                flex-direction: column;
            }
            .input-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <span class="bot-icon">🤖</span>
            <h1 class="bot-name">Muzammil <span>MD</span></h1>
            <p class="subtitle">WhatsApp Bot Management Panel</p>
        </div>

        <!-- Status Card -->
        <div class="status-card">
            <div class="status-row">
                <span class="label">📊 Status</span>
                <span class="value" id="statusDisplay">
                    <span class="status-dot offline" id="statusDot"></span>
                    <span id="statusText">Disconnected</span>
                </span>
            </div>
            <div class="status-row">
                <span class="label">📌 Mode</span>
                <span class="value">
                    <span class="mode-badge public" id="modeBadge">PUBLIC</span>
                </span>
            </div>
            <div class="status-row">
                <span class="label">👑 Owner</span>
                <span class="value" style="color:#4fc3f7;">+923039107958</span>
            </div>
        </div>

        <!-- QR Section -->
        <div class="qr-box">
            <div id="qrContainer">
                <div class="qr-placeholder">📱 Waiting for QR Code...</div>
            </div>
        </div>

        <!-- Pairing Section -->
        <div class="pairing-box">
            <h3>📱 Pair with Phone Number</h3>
            <div class="input-group">
                <input type="text" id="phoneInput" placeholder="Enter number (e.g., 923001234567)">
                <button class="btn btn-primary" id="pairBtn">Pair</button>
            </div>
            <div class="pair-code-display" id="pairCodeDisplay">
                Code: <span id="pairCode">123456</span>
            </div>
        </div>

        <!-- Controls -->
        <div class="btn-group">
            <button class="btn btn-secondary" id="refreshBtn">🔄 Refresh</button>
            <button class="btn btn-danger" id="logoutBtn">🚪 Logout</button>
        </div>

        <!-- Mode Control -->
        <div class="mode-control">
            <button class="btn btn-success" id="setPublicBtn">🌍 Public Mode</button>
            <button class="btn btn-danger" id="setPrivateBtn">🔒 Private Mode</button>
        </div>

        <!-- Support -->
        <div class="btn-group" style="margin-top:10px;">
            <button class="btn btn-primary" onclick="window.open('https://wa.me/923039107958', '_blank')">
                💬 Contact Admin
            </button>
            <button class="btn btn-success" onclick="window.open('https://wa.me/923039107958', '_blank')">
                🆘 Support
            </button>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>✍️ <span class="pro">Prowed By: Wasif Ali</span></p>
            <p style="margin-top:5px; font-size:12px; color:#555;">
                Made with ❤️ | Muzammil MD v2.0
            </p>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <script>
        // ============ DOM Elements ============
        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');
        const modeBadge = document.getElementById('modeBadge');
        const qrContainer = document.getElementById('qrContainer');
        const phoneInput = document.getElementById('phoneInput');
        const pairBtn = document.getElementById('pairBtn');
        const pairCodeDisplay = document.getElementById('pairCodeDisplay');
        const pairCode = document.getElementById('pairCode');
        const refreshBtn = document.getElementById('refreshBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const setPublicBtn = document.getElementById('setPublicBtn');
        const setPrivateBtn = document.getElementById('setPrivateBtn');
        const toast = document.getElementById('toast');

        let toastTimeout = null;

        // ============ Toast Function ============
        function showToast(message, type = 'success') {
            toast.textContent = message;
            toast.className = 'toast show ' + type;
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.className = 'toast';
            }, 4000);
        }

        // ============ Update UI ============
        function updateUI(data) {
            // Status
            if (data.connected) {
                statusText.textContent = 'Connected';
                statusDot.className = 'status-dot online';
            } else if (data.status === 'QR_READY') {
                statusText.textContent = 'Scan QR';
                statusDot.className = 'status-dot waiting';
            } else {
                statusText.textContent = 'Disconnected';
                statusDot.className = 'status-dot offline';
            }

            // Mode
            if (data.mode === 'public') {
                modeBadge.textContent = 'PUBLIC';
                modeBadge.className = 'mode-badge public';
            } else {
                modeBadge.textContent = 'PRIVATE';
                modeBadge.className = 'mode-badge private';
            }

            // QR Code
            if (data.connected) {
                qrContainer.innerHTML = `
                    <div style="color:#4caf50; font-size:20px; font-weight:600;">
                        ✅ Connected Successfully!
                        <div style="font-size:14px; color:#888; margin-top:10px;">
                            ${data.botName} is online
                        </div>
                    </div>
                `;
            } else if (data.qr) {
                qrContainer.innerHTML = `<img id="qrImage" src="${data.qr}" alt="QR Code">`;
            } else {
                qrContainer.innerHTML = `<div class="qr-placeholder">📱 Waiting for QR Code...</div>`;
            }

            // Pairing Code
            if (data.pairingCode) {
                pairCode.textContent = data.pairingCode;
                pairCodeDisplay.className = 'pair-code-display show';
            } else {
                pairCodeDisplay.className = 'pair-code-display';
            }
        }

        // ============ Fetch Status ============
        async function fetchStatus() {
            try {
                const response = await fetch('/status');
                const data = await response.json();
                updateUI(data);
            } catch (error) {
                console.error('Error fetching status:', error);
            }
        }

        // ============ Fetch QR ============
        async function fetchQR() {
            try {
                const response = await fetch('/qr');
                const data = await response.json();
                if (!data.connected && data.qr) {
                    qrContainer.innerHTML = `<img id="qrImage" src="${data.qr}" alt="QR Code">`;
                }
                if (data.pairingCode) {
                    pairCode.textContent = data.pairingCode;
                    pairCodeDisplay.className = 'pair-code-display show';
                }
            } catch (error) {
                console.error('Error fetching QR:', error);
            }
        }

        // ============ Pair ============
        async function pairNumber() {
            const phone = phoneInput.value.trim();
            if (!phone) {
                showToast('Please enter a phone number!', 'error');
                return;
            }

            pairBtn.disabled = true;
            pairBtn.textContent = '⏳ Pairing...';

            try {
                const response = await fetch('/pair', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone })
                });
                const data = await response.json();

                if (data.success) {
                    showToast(`✅ Pairing code sent to ${phone}`, 'success');
                    if (data.code) {
                        pairCode.textContent = data.code;
                        pairCodeDisplay.className = 'pair-code-display show';
                    }
                } else {
                    showToast('❌ ' + data.error, 'error');
                }
            } catch (error) {
                showToast('❌ Error pairing!', 'error');
            }

            pairBtn.disabled = false;
            pairBtn.textContent = 'Pair';
        }

        // ============ Set Mode ============
        async function setMode(mode) {
            try {
                const response = await fetch('/setmode', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mode })
                });
                const data = await response.json();
                if (data.success) {
                    showToast(`✅ Mode changed to ${mode.toUpperCase()}`, 'success');
                    fetchStatus();
                } else {
                    showToast('❌ ' + data.error, 'error');
                }
            } catch (error) {
                showToast('❌ Error changing mode!', 'error');
            }
        }

        // ============ Logout ============
        async function logout() {
            if (!confirm('Are you sure you want to logout?')) return;

            try {
                const response = await fetch('/logout', {
                    method: 'POST'
                });
                const data = await response.json();
                if (data.success) {
                    showToast('✅ Logged out successfully', 'success');
                    setTimeout(() => location.reload(), 1500);
                } else {
                    showToast('❌ ' + data.error, 'error');
                }
            } catch (error) {
                showToast('❌ Error logging out!', 'error');
            }
        }

        // ============ Event Listeners ============
        pairBtn.addEventListener('click', pairNumber);
        refreshBtn.addEventListener('click', () => {
            fetchStatus();
            fetchQR();
            showToast('🔄 Refreshed!', 'success');
        });
        logoutBtn.addEventListener('click', logout);
        setPublicBtn.addEventListener('click', () => setMode('public'));
        setPrivateBtn.addEventListener('click', () => setMode('private'));

        // Enter key for phone input
        phoneInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') pairNumber();
        });

        // ============ Auto Refresh ============
        fetchStatus();
        fetchQR();
        setInterval(fetchStatus, 3000);
        setInterval(fetchQR, 5000);
    </script>

</body>
</html>
